<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>公会控制台</title>
    <style>
        :root { --bg: #0a0a0a; --fg: #00ffff; --border: #113333; --success: #00ff00; --danger: #ff0055; --table-bg: #050505; }
        body { font-family: "Courier New", Courier, monospace; background: var(--bg); color: var(--fg); padding: 20px; line-height: 1.5; margin: 0; }
        
        .header { border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        h1 { margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        /* 密钥控制面板 */
        .control-panel { background: #001111; border: 1px solid var(--fg); padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; margin-bottom: 5px; color: #55aaaa; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box;}
        button { background: var(--fg); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; height: 40px; }
        button:hover { background: #fff; }

        /* 账本表格 */
        table { width: 100%; border-collapse: collapse; background: var(--table-bg); }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 0.9rem; }
        th { background: #001a1a; color: #55aaaa; text-transform: uppercase; }
        tr:hover { background: #001111; }
        
        .status-PENDING { color: #aaaaaa; }
        .status-SETTLED { color: var(--success); font-weight: bold; }
        .status-REJECTED { color: var(--danger); text-decoration: line-through; }

        .btn-action { background: transparent; border: 1px solid; padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; color: inherit; }
        .btn-action.settle { border-color: var(--success); color: var(--success); }
        .btn-action.settle:hover { background: var(--success); color: #000; }
        .btn-action.reject { border-color: var(--danger); color: var(--danger); }
        .btn-action.reject:hover { background: var(--danger); color: #000; }

        #log { margin-top: 20px; font-size: 0.8rem; color: #55aaaa; height: 100px; overflow-y: auto; border: 1px dashed var(--border); padding: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>>> 结算中心</h1>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #55aaaa;">警告：操作将直接修改 Durable Object 状态，不可逆。</p>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <label>API 宿主地址 (你的 Cloudflare Pages 网址)</label>
            <input type="text" id="api_host" value="">
        </div>
        <div class="input-group">
            <label>任务代号</label>
            <input type="text" id="quest_id" value="G-001">
        </div>
        <div class="input-group">
            <label>通行证 (ADMIN_SECRET)</label>
            <input type="password" id="admin_secret" placeholder="输入云端设定的密钥">
        </div>
        <button onclick="fetchFullLedger()">提取完整账本</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="50">席位</th>
                <th width="150">猎人代号</th>
                <th width="250">联系邮箱</th>
                <th width="200">接单时间</th>
                <th width="100">当前状态</th>
                <th>审计操作 (发送支付宝红包后点击)</th>
            </tr>
        </thead>
        <tbody id="table_body">
            <tr><td colspan="6" style="text-align:center; color:#55aaaa;">等待提取数据...</td></tr>
        </tbody>
    </table>

    <div id="log">>> 终端就绪。</div>

    <script>
        const logEl = document.getElementById('log');
        const tBody = document.getElementById('table_body');

        function writeLog(msg) {
            logEl.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + logEl.innerHTML;
        }

        // 获取基础请求头
        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': document.getElementById('admin_secret').value
            };
        }

        function getApiHost() {
            let host = document.getElementById('api_host').value.replace(/\/$/, '');
            if (!host) host = window.location.origin;
            return host;
        }
        
        // 提取全量数据
        async function fetchFullLedger() {
            const host = getApiHost();
            const questId = document.getElementById('quest_id').value;
            const secret = document.getElementById('admin_secret').value;

            if (!host || !secret) return alert("地址和通行证不能为空！");

            tBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">正在...</td></tr>`;
            writeLog(`发起对 ${host} 的提取...`);

            try {
                const res = await fetch(`${host}/api/admin?id=${questId}`, {
                    method: 'GET',
                    headers: getAuthHeaders()
                });

                if (!res.ok) throw new Error(await res.text());
                
                const data = await res.json();
                renderTable(data.hunters || []);
                writeLog(`提取成功。共发现 ${data.hunters ? data.hunters.length : 0} 条契约记录。`);

            } catch (err) {
                tBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--danger);">失败: ${err.message}</td></tr>`;
                writeLog(`提取失败: ${err.message}`);
            }
        }

        // 渲染表格
        function renderTable(hunters) {
            tBody.innerHTML = '';
            if (hunters.length === 0) {
                tBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">暂无猎人接取。</td></tr>`;
                return;
            }

            hunters.forEach((h, index) => {
                const statusStr = h.status || 'PENDING';
                const isPending = statusStr === 'PENDING';
                
                let actions = '';
                if (isPending) {
                    actions = `
                        <button class="btn-action settle" onclick="updateStatus('${h.email}', 'SETTLED')">✅ 核销打款</button>
                        <button class="btn-action reject" onclick="updateStatus('${h.email}', 'REJECTED')">❌ 驳回(未履约)</button>
                    `;
                } else {
                    actions = `<span style="color:#55aaaa;">操作已被锁定</span>`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${h.name}</td>
                    <td style="color: #fff;">${h.email}</td>
                    <td style="font-size:0.8rem;">${new Date(h.timestamp).toLocaleString()}</td>
                    <td class="status-${statusStr}">${statusStr}</td>
                    <td>${actions}</td>
                `;
                tBody.appendChild(tr);
            });
        }

        // 强行篡改状态
        async function updateStatus(email, newStatus) {
            if (!confirm(`警告：确认将邮箱 ${email} 的状态改为 ${newStatus} 吗？\n（点击核销前，请确认已通过支付宝口令发送红包）`)) return;

            const host = getApiHost();
            const questId = document.getElementById('quest_id').value;

            try {
                writeLog(`正在向 ${email} 注入新状态 [${newStatus}]...`);
                const res = await fetch(`${host}/api/admin?id=${questId}`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ email: email, status: newStatus })
                });

                if (!res.ok) throw new Error(await res.text());
                
                writeLog(`修改成功！邮箱：${email}，新状态：${newStatus}`);
                fetchFullLedger(); // 篡改后重新拉取最新账本

            } catch (err) {
                writeLog(`修改失败: ${err.message}`);
                alert("操作失败：" + err.message);
            }
        }
    </script>
</body>
</html>
