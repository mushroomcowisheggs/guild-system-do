<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慈善家工会悬赏板</title>
    <style>
        :root { --bg: #050505; --fg: #00ff00; --border: #333; --alert: #ff0055; }
        body { font-family: "Courier New", Courier, monospace; background: var(--bg); color: var(--fg); padding: 20px; line-height: 1.6; }
        .card { border: 1px solid var(--border); padding: 20px; max-width: 600px; margin: 0 auto; background: #0a0a0a; }
        
        h1, h2 { text-transform: uppercase; border-bottom: 1px dashed var(--border); padding-bottom: 10px; margin-top: 0; }
        
        /* 视频占位符 */
        .video-placeholder { background: #111; border: 1px solid var(--border); padding: 40px 20px; text-align: center; letter-spacing: 5px; margin: 20px 0; font-weight: bold; color: #555; }
        
        /* 表单样式 */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input { width: 100%; box-sizing: border-box; padding: 10px; background: #000; color: var(--fg); border: 1px solid var(--border); font-family: inherit; }
        input:focus { border-color: var(--fg); outline: none; }
        
        button { width: 100%; padding: 15px; background: #111; color: var(--fg); border: 1px solid var(--fg); font-weight: bold; cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin-top: 10px; }
        button:hover:not(:disabled) { background: var(--fg); color: #000; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        
        /* 50人账本矩阵 */
        .ledger-section { margin-top: 40px; }
        .ledger-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 5px; margin-top: 10px; }
        .slot { border: 1px solid var(--border); padding: 8px; font-size: 0.8rem; text-align: center; background: #000; transition: all 0.3s; }
        .slot.taken { background: rgba(0, 255, 0, 0.1); border-color: var(--fg); color: var(--fg); }
        .slot.settled { background: rgba(255, 0, 85, 0.15); border-color: var(--alert); color: var(--alert); font-weight: bold; }
        .slot.empty { color: #444; }

        /* 强制审查弹窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #050505; border: 1px solid var(--alert); padding: 30px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 20px rgba(255,0,85,0.2); }
        .modal-box h3 { color: var(--alert); margin-top: 0; }
        
        #sys-msg { margin-top: 15px; font-weight: bold; color: var(--alert); text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>>> 慈善家工会悬赏板</h1>
        <h2>代号：G-001 [额度: 50份]</h2>
        <h2>总价: 500元</h2>
        
        <div class="video-placeholder">
            XXXXXXXXXXXXXXXX
        </div>

        <p><strong>目标：</strong>购2瓶水赠环卫工</p>
        <p><strong>结算：</strong>垫付4元，凭证核验后打款5元 (劳务: 1元)</p>
        
        <form id="quest-form">
            <input type="hidden" id="quest_id" value="G-001">
            <div class="form-group">
                <label>猎人代号 (公开展示)：</label>
                <input type="text" id="hunter_name" required placeholder="例如: 边缘行者01" maxlength="15">
            </div>
            <div class="form-group">
                <label>接收邮箱 (唯一凭证)：</label>
                <input type="email" id="hunter_email" required placeholder="worker@example.com">
            </div>
            <button type="submit" id="btn-init">抢单</button>
        </form>
        
        <div id="sys-msg"></div>

        <!-- 透明账本 -->
        <div class="ledger-section">
            <h2>公共透明账本 (实时名额)</h2>
            <div id="ledger-stats">读取中...</div>
            <div class="ledger-grid" id="ledger-grid">
                <!-- 由 JS 生成 50 个槽位 -->
            </div>
        </div>
    </div>

    <!-- 惩罚性时间摩擦弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h3>⚠️最终确认</h3>
            <p>你是否已经完整观看了任务要求？</p>
            <div style="font-size: 2rem; margin: 20px 0; color: var(--fg);" id="countdown">10</div>
            <button type="button" id="btn-confirm" disabled>等待...</button>
            <button type="button" onclick="closeModal()" style="background: transparent; border: 1px solid #555; color: #888;">放弃接单</button>
        </div>
    </div>

    <script>
        const MAX_SLOTS = 50;
        const QUEST_ID = 'G-001';
        
        const form = document.getElementById('quest-form');
        const modal = document.getElementById('modal');
        const btnConfirm = document.getElementById('btn-confirm');
        const countdownEl = document.getElementById('countdown');
        const msgEl = document.getElementById('sys-msg');
        const gridEl = document.getElementById('ledger-grid');
        const statsEl = document.getElementById('ledger-stats');

        let timer;
        let submitData = {};

        // 初始化：拉取最新账本状态
        async function fetchLedger() {
            try {
                const res = await fetch(`/api/submit?id=${QUEST_ID}`);
                const data = await res.json();
                renderGrid(data.hunters || []);
            } catch (err) {
                statsEl.innerText = "无法拉取账本。";
            }
        }

        // 渲染 50 个公开坑位
        function renderGrid(hunters) {
            gridEl.innerHTML = '';
            statsEl.innerText = `当前进度: ${hunters.length} / ${MAX_SLOTS}`;
            
            if(hunters.length >= MAX_SLOTS) {
                document.getElementById('btn-init').disabled = true;
                document.getElementById('btn-init').innerText = "已被抢空";
                msgEl.innerText = "该任务 50 个名额已满。";
            }

            for (let i = 0; i < MAX_SLOTS; i++) {
                const slot = document.createElement('div');
                if (i < hunters.length) {
                    const hunterStatus = hunters[i].status || 'PENDING';
                    
                    if (hunterStatus === 'SETTLED') {
                        slot.className = 'slot settled';
                    } else {
                        slot.className = 'slot taken';
                    }
                    slot.innerText = `[${i+1}] ${hunters[i].name}`;
                } else {
                    slot.className = 'slot empty';
                    slot.innerText = `[${i+1}] 待接取`;
                }
                gridEl.appendChild(slot);
            }
        }

        // 拦截表单提交，触发时间惩罚
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            msgEl.innerText = '';
            
            submitData = {
                quest_id: document.getElementById('quest_id').value,
                hunter_name: document.getElementById('hunter_name').value.trim(),
                hunter_email: document.getElementById('hunter_email').value.trim()
            };

            openModal();
        });

        function openModal() {
            modal.style.display = 'flex';
            btnConfirm.disabled = true;
            let timeLeft = 10;
            countdownEl.innerText = timeLeft;
            btnConfirm.innerText = `等待结束...`;

            timer = setInterval(() => {
                timeLeft--;
                countdownEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btnConfirm.disabled = false;
                    btnConfirm.innerText = ">> 抢单！ <<";
                    btnConfirm.style.borderColor = "var(--fg)";
                    btnConfirm.style.color = "var(--fg)";
                }
            }, 1000);
        }

        function closeModal() {
            modal.style.display = 'none';
            clearInterval(timer);
        }

        // 最终致命提交
        btnConfirm.addEventListener('click', async () => {
            closeModal();
            msgEl.style.color = "var(--fg)";
            msgEl.innerText = "正在向 Cloudflare 边缘节点写入...";
            document.getElementById('btn-init').disabled = true;

            const formData = new FormData();
            formData.append('quest_id', submitData.quest_id);
            formData.append('hunter_name', submitData.hunter_name);
            formData.append('hunter_email', submitData.hunter_email);

            try {
                const res = await fetch('/api/submit', { method: 'POST', body: formData });
                const resultText = await res.text();
                
                if (res.ok) {
                    msgEl.style.color = "var(--fg)";
                    msgEl.innerText = "锁定成功！请通过邮箱发送证明材料。";
                    fetchLedger(); // 重新渲染
                } else {
                    msgEl.style.color = "var(--alert)";
                    msgEl.innerText = `拦截: ${resultText}`;
                    document.getElementById('btn-init').disabled = false;
                    fetchLedger(); // 可能名额已被抢光，刷新看看
                }
            } catch (err) {
                msgEl.style.color = "var(--alert)";
                msgEl.innerText = "写入失败。";
                document.getElementById('btn-init').disabled = false;
            }
        });

        // 载入页面时执行
        window.onload = fetchLedger;
    </script>
</body>
</html>
