# ==========================================
# Cloudflare Workers + Durable Objects 配置
# 慈善家工会悬赏板
# ==========================================

name = "charity-guild-system"
main = "backend/index.js"
compatibility_date = "2026-05-25"

# ---- Durable Objects 绑定 ----
# 关键配置：将 QuestDO 类绑定到 QUEST_DO 命名空间
# 所有请求通过 questId 路由到同一个 DO 实例，保证串行执行
[[durable_objects.bindings]]
name = "QUEST_DO"
class_name = "QuestDO"

# ---- Durable Objects 迁移声明 ----
# 首次部署时需要，后续修改类名或新增 DO 时需要添加新的迁移
[[migrations]]
tag = "v1"
new_classes = ["QuestDO"]

# ---- 环境变量 ----
# ADMIN_SECRET: 管理员密钥，用于 /api/admin 接口的权限校验
# 在生产环境中应使用 wrangler secret put ADMIN_SECRET 设置
[vars]
# ADMIN_SECRET = "your-secret-key-here"  # 开发环境可在此设置，生产环境使用 secrets
# MAX_SLOTS = 50  # 也可在 DO 代码中直接定义常量，不必放在 vars 中

# ---- 静态资源（Assets）----
# public 目录下的将自动作为静态资源提供
[[assets]]
bucket = "./frontend/public"
# protected/ 不作为 assets 目录，而是作为 Worker 代码层虚拟路由，由 Worker 鉴权后返回内容
# （内容可以来自外部存储、内嵌字符串，或通过另一个 assets 绑定），暂未实现